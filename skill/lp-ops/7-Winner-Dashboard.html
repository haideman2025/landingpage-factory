<!DOCTYPE html><html lang=vi><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Winner Dashboard — LP Ops</title>
<style>:root{--bg:#0b0d11;--s1:#13171e;--ink:#f3f6fa;--mut:#94a0b2;--acc:#00d4aa;--coral:#e85b5b;--line:#262d39}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Arial;padding:20px 14px}.wrap{max-width:1040px;margin:0 auto}h1{font-size:22px}.sub{color:var(--mut);font-size:13px;margin:4px 0 14px}.card{background:var(--s1);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}input{width:100%;background:#080a0e;border:1px solid var(--line);color:#fff;border-radius:8px;padding:9px;font-size:13px}button{background:var(--acc);color:#06231b;border:none;border-radius:8px;padding:9px 14px;font-weight:800;cursor:pointer}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid var(--line);padding:7px 9px;text-align:left}th{background:#1b212b;color:var(--acc)}.win{color:var(--acc);font-weight:800}.lose{color:var(--coral)}.stat{display:inline-block;background:#1b212b;border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin:3px;font-size:13px}.stat b{color:var(--acc)}</style></head><body><div class=wrap>
<h1>🏆 Winner Dashboard</h1><div class=sub>Dán link Google Sheet đã Publish-to-web dạng CSV (File → Share → Publish to web → CSV). Tự gom lead theo lp_id để tìm LP thắng.</div>
<div class=card><label style="font-size:12px;color:var(--mut)">Published CSV URL</label><input id=url placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv"><div style="margin-top:8px"><button onclick=load()>Tải dữ liệu</button> <span id=st style="color:var(--mut);font-size:12px"></span></div></div>
<div id=summary></div>
<div class=card><table id=tb><thead><tr><th>lp_id</th><th>Lead</th><th>Lead 7 ngày</th><th>Nguồn nhiều nhất</th><th>Đánh giá</th></tr></thead><tbody></tbody></table></div>
<script>
function parseCSV(t){const r=[];let i=0,f='',row=[],q=false;while(i<t.length){const c=t[i];if(q){if(c=='"'){if(t[i+1]=='"'){f+='"';i++}else q=false}else f+=c}else{if(c=='"')q=true;else if(c==','){row.push(f);f=''}else if(c=='\n'||c=='\r'){if(f!==''||row.length){row.push(f);r.push(row);row=[];f=''}if(c=='\r'&&t[i+1]=='\n')i++}else f+=c}i++}if(f!==''||row.length){row.push(f);r.push(row)}return r}
async function load(){const u=document.getElementById('url').value.trim();if(!u)return;document.getElementById('st').textContent='Đang tải...';try{const t=await (await fetch(u)).text();const rows=parseCSV(t);const head=rows[0].map(x=>x.trim());const idx=n=>head.indexOf(n);const data=rows.slice(1).filter(r=>r.length>1);const now=Date.now();const by={};data.forEach(r=>{const lp=r[idx('lp_id')]||'(none)';by[lp]=by[lp]||{n:0,n7:0,src:{}};by[lp].n++;const ts=Date.parse(r[idx('ts')]||'');if(ts&&now-ts<7*864e5)by[lp].n7++;const s=r[idx('utm_source')]||'-';by[lp].src[s]=(by[lp].src[s]||0)+1;});const arr=Object.entries(by).sort((a,b)=>b[1].n-a[1].n);const total=data.length;const max=arr.length?arr[0][1].n:0;document.getElementById('summary').innerHTML='<div class=card><span class=stat>Tổng lead: <b>'+total+'</b></span><span class=stat>Số LP: <b>'+arr.length+'</b></span><span class=stat>LP thắng: <b>'+(arr[0]?arr[0][0]:'-')+'</b></span></div>';document.querySelector('#tb tbody').innerHTML=arr.map(([lp,d])=>{const top=Object.entries(d.src).sort((a,b)=>b[1]-a[1])[0];const verdict=d.n>=max*0.7?'<span class=win>SCALE 🚀</span>':(d.n<=max*0.25?'<span class=lose>KILL ✕</span>':'Theo dõi');return '<tr><td>'+lp+'</td><td>'+d.n+'</td><td>'+d.n7+'</td><td>'+(top?top[0]:'-')+'</td><td>'+verdict+'</td></tr>';}).join('');document.getElementById('st').textContent='Xong · '+total+' lead';}catch(e){document.getElementById('st').textContent='Lỗi: '+e.message+' (Sheet đã Publish CSV chưa?)';}}
</script></div></body></html>
